name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # バージョンはpackage.jsonのpackageManagerを参照

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 依存関係のインストール
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: 型チェック
        run: pnpm typecheck

      - name: テスト
        run: pnpm test

      - name: クライアントビルド
        run: pnpm --filter @tsumiwiki/client build
